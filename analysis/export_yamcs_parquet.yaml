- name: /YAOKI/Rover/Rx_cnt
  display_name: Number of valid commands received
  description: |
    Simple counter that increments for each valid command received
    Commands are considered valid if more than 5 key/value pairs in the JSON string. The nominal number is 7.
    Note: if the command has between 1 and 5 key/value pairs, the command is still processed (!) but Rx_cnt is not incremented (!!)
    Note: pings are not commands.
    Min value: 0
    Max value: 98 (then resets to 0)
  unit: count
  type: integer
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Valid command receive count. Units: count.'
    eng_value: 'Engineering value for Valid command receive count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
- name: /YAOKI/Rover/RxError_cnt
  display_name: Number of error commands received
  description: |
    Simple counter that increments for each command received that is considered eroneous (and therefore not processed).
    The error criteria is if the command has zero key/value pairs in the JSON string.
    Min value: 0
    Max value: 98 (then resets to 0)
  unit: count
  type: integer
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Command receive error count. Units: count.'
    eng_value: 'Engineering value for Command receive error count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
