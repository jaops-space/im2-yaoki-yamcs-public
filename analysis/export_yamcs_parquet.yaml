- name: /YAOKI/Rover/CamSent_cnt
  display_name: Number of images sent
  description: 'Simple counter that increments by 1 for every 960 camera packet sent
    (corresponds to each camera image).

    This same counter is used in the CSP header of the camera packets.

    Min value: 0

    Max value: 99 (then resets to 0)'
  unit: unitless
  type: integer
  file: YAOKI__Rover__CamSent_cnt.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Number of images sent. Units: unitless.'
    eng_value: 'Engineering value for Number of images sent. Units: unitless. Identical
      to raw_value unless the MDB defines a calibrator.'
- name: /YAOKI/Rover/RxError_cnt
  display_name: Number of error commands received
  description: 'Simple counter that increments for each command received that is considered
    eroneous (and therefore not processed).

    The error criteria is if the command has zero key/value pairs in the JSON string.

    Min value: 0

    Max value: 98 (then resets to 0)'
  unit: unitless
  type: integer
  file: YAOKI__Rover__RxError_cnt.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Number of error commands received. Units:
      unitless.'
    eng_value: 'Engineering value for Number of error commands received. Units: unitless.
      Identical to raw_value unless the MDB defines a calibrator.'
- name: /YAOKI/Rover/Rx_cnt
  display_name: Number of valid commands received
  description: 'Simple counter that increments for each valid command received

    Commands are considered valid if more than 5 key/value pairs in the JSON string.
    The nominal number is 7.

    Note: if the command has between 1 and 5 key/value pairs, the command is still
    processed (!) but Rx_cnt is not incremented (!!)

    Note: pings are not commands.

    Min value: 0

    Max value: 98 (then resets to 0)'
  unit: unitless
  type: integer
  file: YAOKI__Rover__Rx_cnt.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Number of valid commands received. Units:
      unitless.'
    eng_value: 'Engineering value for Number of valid commands received. Units: unitless.
      Identical to raw_value unless the MDB defines a calibrator.'
