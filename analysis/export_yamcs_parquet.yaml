- name: /YAOKI/Rover/Status_BAT
  display_name: Status battery on
  description: 'l.291: Cleared at the start of main.c (before the main while loop)
    after setting DC_Relay_OFF

    l.631: Set if command is received with {"bat": "1"}

    l.635: Cleared if command is received with {"bat": "0"}'
  unit: unitless
  type: integer
  file: YAOKI__Rover__Status_BAT.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Status battery on. Units: unitless.'
    eng_value: 'Engineering value for Status battery on. Units: unitless. Identical
      to raw_value unless the MDB defines a calibrator.'
- name: /YAOKI/Rover/Status_CAM
  display_name: The camera is actively taking the picture / sending the data via CSP
  description: 'l.732: Cleared if the previous loop had isCamData == 1 and the current
    loop has isCamData == 0

    l.869: Set if(isCamData == 1) AND if(sent_camera_packet_cnt==0)

    l.902 and l.905: Cleared if(sent_camera_packet_cnt>=960). Note: at the same time
    as Camera_ToCPU_End() and isCamData=0;'
  unit: unitless
  type: integer
  file: YAOKI__Rover__Status_CAM.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for The camera is actively taking the picture
      / sending the data via CSP. Units: unitless.'
    eng_value: 'Engineering value for The camera is actively taking the picture /
      sending the data via CSP. Units: unitless. Identical to raw_value unless the
      MDB defines a calibrator.'
- name: /YAOKI/Rover/Status_ICUT
  display_name: The deployment wire is currently being cut
  description: 'Indicates that the wire is being cut by the activation of the Heater
    Relay for a set number of seconds.

    The nominal sequence of this status is cleared -> set (with command {"cut": "1"})
    -> cleared (after the set number of seconds)

    l.718: Cleared if isCut!= 1

    l.810: Cleared similarly (first case is if isCamData == 1. / Second case is if
    isCamData == 0)

    l.836: Set if isCut == 1 and cut_cnt == 0. Note: then blocks to send the high
    frequency accelerometer data TxGsenData_CutDrop()

    l.853: Cleared if (cut_cnt > cut_time). Note: then Heater_Relay_OFF() and Sets
    STATUS_WASCUT'
  unit: unitless
  type: integer
  file: YAOKI__Rover__Status_ICUT.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for The deployment wire is currently being cut.
      Units: unitless.'
    eng_value: 'Engineering value for The deployment wire is currently being cut.
      Units: unitless. Identical to raw_value unless the MDB defines a calibrator.'
- name: /YAOKI/Rover/Status_MOVE
  display_name: Status_MOVE
  description: 'l.685: Cleared if isMove != 1. which should mean "and get Stop motor
    command while moving , or No commands while being stay"

    l.777: Cleared similarly (first case is if isCamData == 1 / Second case is if
    isCamData == 0)

    l.925: Set if isMove==1 AND Move_cnt == 0

    l.944: Cleared if (Move_cnt > Move_time). Note: at the same time as BLDC_1_OFF()
    and BLDC_2_OFF()'
  unit: unitless
  type: integer
  file: YAOKI__Rover__Status_MOVE.parquet
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Status_MOVE. Units: unitless.'
