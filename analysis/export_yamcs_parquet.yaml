    raw_value: 'Raw telemetry value for Last RSSI. Units: dBm.'
    eng_value: 'Engineering value for Last RSSI. Units: dBm. For these exported YAOKI
      streams this is normally identical to raw_value unless the source archive supplied
      a calibrated value.'
- name: /YAOKI/Rover/Rx_cnt
  display_name: Valid command receive count
  description: Rover counter for valid commands received. Pings are not commands.
    The counter runs from 0 to 98 and then resets to 0.
  unit: count
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Valid command receive count. Units: count.'
    eng_value: 'Engineering value for Valid command receive count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
- name: /YAOKI/Rover/RxError_cnt
  display_name: Command receive error count
  description: Rover counter for erroneous received commands that were not processed.
    The counter runs from 0 to 98 and then resets to 0.
  unit: count
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Command receive error count. Units: count.'
    eng_value: 'Engineering value for Command receive error count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
- name: /YAOKI/Rover/Tx_cnt
  display_name: Telemetry transmit count
  description: Rover counter for sent telemetry packet sets. It increments once per
    telemetry send allocation, roughly every 30 seconds, and resets after 98.
  unit: count
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Telemetry transmit count. Units: count.'
    eng_value: 'Engineering value for Telemetry transmit count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
- name: /YAOKI/Rover/CamSend_num
  display_name: Current image number
  description: Current image number being captured or sent by the rover camera.
  unit: image number
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
