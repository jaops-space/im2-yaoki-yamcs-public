- name: /YAOKI/Rover/Status_BAT
  display_name: Battery on status
  description: |
    l.291: Cleared at the start of main.c (before the main while loop) after setting DC_Relay_OFF
    l.631: Set if command is received with {"bat": "1"}
    l.635: Cleared if command is received with {"bat": "0"}
  unit: unitless
  type: integer
  fields:
    status: Battery on status
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_CAM
  display_name:  The camera is actively taking the picture / sending the data via CSP 
  description: |
    l.732: Cleared if the previous loop had isCamData == 1 and the current loop has isCamData == 0
    l.869: Set if(isCamData == 1) AND if(sent_camera_packet_cnt==0)
    l.902 and l.905: Cleared if(sent_camera_packet_cnt>=960). Note: at the same time as Camera_ToCPU_End() and isCamData=0;
  unit: unitless
  type: integer
  fields:
    status: Camera status
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_ICUT
  display_name:  The deployment wire is currently being cut 
  description: |
    Indicates that the wire is being cut by the activation of the Heater Relay for a set number of seconds. 
    The nominal sequence of this status is cleared -> set (with command {"cut": "1"}) -> cleared (after the set number of seconds)
    l.718: Cleared if isCut!= 1
    l.810: Cleared similarly (first case is if isCamData == 1. / Second case is if isCamData == 0)
    l.836: Set if isCut == 1 and cut_cnt == 0. Note: then blocks to send the high frequency accelerometer data TxGsenData_CutDrop()
    l.853: Cleared if (cut_cnt > cut_time). Note: then Heater_Relay_OFF() and Sets STATUS_WASCUT
  unit: unitless
  type: integer
  fields:
    status: ICUT status
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_MOVE
  display_name:  The rover should be moving (e.g time remains since the last move command set the move timer 
  description: |
    l.685: Cleared if isMove != 1. which should mean "and get Stop motor command while moving , or No commands while being stay"
    l.777: Cleared similarly (first case is if isCamData == 1 / Second case is if isCamData == 0)
    l.925: Set if isMove==1 AND Move_cnt == 0
    l.944: Cleared if (Move_cnt > Move_time). Note: at the same time as BLDC_1_OFF() and BLDC_2_OFF()
  unit: unitless
  type: integer
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_NORX
  display_name:  No pings received for 3 minutes 
  description: |
    l.415: Set if (NoRx_cnt > NORX_LIMIT) Note: at the same time, the two motors are commanded forward for 30ms. Then the counter resets
    l.603: Cleared if ping is received.
    l.626: Cleared if a command is received.
  unit: unitless
  type: integer
  fields:
    status: No ping status
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_TLM
  display_name: Raw status telemetry. Prefer to use the split status parameters instead
  description: Raw status telemetry. Prefer to use the split status parameters instead
  unit: count
  type: integer
  fields:
    status: Telemetry status
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_WCUT
  display_name: Wire cut complete
  description: Binary rover status bit indicating that the wire-cut command was sent
    and the allocated wire-cut heater time elapsed.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Tx_cnt
  display_name: Number of sent telemetry packet sets
  description: >
    Simple counter that increments at each 'Send TLM' time allocation (~30 seconds)
    (the two telemetry packet sent at the same time are only counted as one)
    Min value: 0
    Max value: 98 (then resets to 0)
  unit: count
  type: integer
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for Telemetry transmit count. Units: count.'
    eng_value: 'Engineering value for Telemetry transmit count. Units: count. For
      these exported YAOKI streams this is normally identical to raw_value unless
      the source archive supplied a calibrated value.'
- name: /YAOKI/Rover/VBAT_CHECK
  display_name: Yaoki power source = 0 if on lander power / 1 if on internal battery power 
  description: >
    l.204: boolean that returns 0 if using power from the lander and 1 if using the internal Yaoki battery
    GPIO measurement that confirms that the command "bat":"1" was successfully executed (DC_Relay_ON())
  unit: unitless
  type: integer
  fields:
    status: 0 if on lander power / 1 if on internal battery power
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
status_streams:
- name: /YAOKI/Rover/Status_BAT
  display_name: Battery on status
  description: Binary rover status bit indicating whether rover battery power is on.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/VBAT_CHECK
  display_name: Power source check
  description: Binary rover power-source status. 0 means lander power; 1 means internal
    YAOKI battery power.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_ICUT
  display_name: Wire cut in progress
  description: Binary rover status bit indicating that the deployment wire is currently
    being cut by the heater relay.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_WCUT
  display_name: Wire cut complete
  description: Binary rover status bit indicating that the wire-cut command was sent
    and the allocated wire-cut heater time elapsed.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_CAM
  display_name: Camera active
  description: Binary rover status bit indicating that the camera is actively taking
    a picture or sending camera data via CSP.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_MOVE
  display_name: Move active
  description: Binary rover status bit indicating that the rover should be moving
    because time remains on the most recent move command.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_NORX
  display_name: No receive timeout
  description: Binary rover status bit indicating that no pings were received for
    the configured timeout, approximately 3 minutes.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_TLM
  display_name: Telemetry mode
  description: Binary rover telemetry mode status. 1 means high-frequency telemetry
    mode; 0 means low-frequency telemetry mode.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
commands:
  source_name: commands
  description: Telecommands exported for the mission interval.
  file: commands.parquet
  fields:
    Generation Time: UTC timestamp when the command was generated.
    Command Name: Fully qualified command name.
    Arguments: Command arguments as exported from the source archive.
    Origin: Command origin reported by the source archive.
    Sequence Number: Command sequence number reported by the source archive.
    Username: User name associated with the command.
    Queue: Command queue name.
    Binary: Binary command payload value, when available.
    Acknowledge_Queued: Queued acknowledgement status.
    Acknowledge_Released: Released acknowledgement status.
    Acknowledge_Sent: Sent acknowledgement status.
    Completion: Command completion status value, when available.
    Return Value: Command return value, when available.
