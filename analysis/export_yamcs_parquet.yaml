defaults:
  url: localhost:8090
  instance: im2-yaoki
  output_dir: yaoki_parquet
  start: '2025-02-27T00:16:30+00:00'
  stop: '2025-03-07T05:42:56.476+00:00'
  range_min_gap: 300.0
telemetry_streams:
- name: /YAOKI/Rover/ADC_TEMP0
  display_name: 'R0: Body (Bottom)'
  description: Rover temperature sensor 0, mounted on the bottom of the rover body.
  unit: deg C
  fields:
    generation_time: UTC timestamp assigned when this telemetry sample was generated.
    acquisition_time: UTC timestamp when the sample was acquired, when available in
      the source data.
    raw_value: 'Raw telemetry value for R0: Body (Bottom). Units: deg C.'
    eng_value: 'Engineering value for R0: Body (Bottom). Units: deg C. For these exported
      YAOKI streams this is normally identical to raw_value unless the source archive
      supplied a calibrated value.'
- name: /YAOKI/Rover/ADC_TEMP1
  display_name: 'R1: Motor board (middleboard)'
  description: Rover temperature sensor 1, mounted on the motor board on the middle
