status_streams:
- name: /YAOKI/Rover/Status_BAT
  display_name: Battery on status
  description: Binary rover status bit indicating whether rover battery power is on.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/VBAT_CHECK
  display_name: Power source check
  description: Binary rover power-source status. 0 means lander power; 1 means internal
    YAOKI battery power.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_ICUT
  display_name: Wire cut in progress
  description: Binary rover status bit indicating that the deployment wire is currently
    being cut by the heater relay.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_WCUT
  display_name: Wire cut complete
  description: Binary rover status bit indicating that the wire-cut command was sent
    and the allocated wire-cut heater time elapsed.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_CAM
  display_name: Camera active
  description: Binary rover status bit indicating that the camera is actively taking
    a picture or sending camera data via CSP.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_MOVE
  display_name: Move active
  description: Binary rover status bit indicating that the rover should be moving
    because time remains on the most recent move command.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_NORX
  display_name: No receive timeout
  description: Binary rover status bit indicating that no pings were received for
    the configured timeout, approximately 3 minutes.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
- name: /YAOKI/Rover/Status_TLM
  display_name: Telemetry mode
  description: Binary rover telemetry mode status. 1 means high-frequency telemetry
    mode; 0 means low-frequency telemetry mode.
  fields:
    status: Decoded binary status value for this interval. 0 means off or false; 1
      means on or true.
    start: UTC start timestamp for the interval where the status held this value.
    stop: UTC stop timestamp for the interval where the status held this value.
commands:
  source_name: commands
  description: Telecommands exported for the mission interval.
  file: commands.parquet
  fields:
    Generation Time: UTC timestamp when the command was generated.
    Command Name: Fully qualified command name.
    Arguments: Command arguments as exported from the source archive.
    Origin: Command origin reported by the source archive.
    Sequence Number: Command sequence number reported by the source archive.
    Username: User name associated with the command.
    Queue: Command queue name.
    Binary: Binary command payload value, when available.
    Acknowledge_Queued: Queued acknowledgement status.
    Acknowledge_Released: Released acknowledgement status.
    Acknowledge_Sent: Sent acknowledgement status.
    Completion: Command completion status value, when available.
    Return Value: Command return value, when available.
